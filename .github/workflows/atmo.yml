name: Fetch indice ATMO

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-atmo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupérer et filtrer l'indice ATMO Lyon
        run: |
          curl -sL "https://www.data.gouv.fr/api/1/datasets/r/d2b9e8e6-8b0b-4bb6-9851-b4fa2efc8201" \
            | grep "69123" \
            | tail -1 \
            | python3 -c "
          import sys, csv, json
          line = sys.stdin.read().strip()
          reader = csv.reader([line])
          row = next(reader)
          result = {
            'code_insee': row[0] if len(row)>0 else '',
            'commune': row[1] if len(row)>1 else '',
            'date': row[2] if len(row)>2 else '',
            'qualificatif': row[3] if len(row)>3 else '',
            'indice': row[4] if len(row)>4 else ''
          }
          print(json.dumps(result))
          " > atmo.json

      - name: Commit et push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git add atmo.json
          git diff --cached --quiet || git commit -m "Update indice ATMO"
          git push --force
