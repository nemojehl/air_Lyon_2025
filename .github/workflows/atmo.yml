name: Fetch indice ATMO

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-atmo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupérer l'indice ATMO
        run: |
          curl -s "https://api.atmo-aura.fr/air/json?insee=69123&api_token=428a454fc005ebdf61636b02788619f7" \
            -o atmo.json

      - name: Commit et push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add atmo.json
          git diff --cached --quiet || git commit -m "Update indice ATMO"
          git push --force
