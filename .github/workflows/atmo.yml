name: Fetch indice ATMO

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-atmo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer et filtrer l'indice ATMO Lyon
        run: |
          python3 - <<'EOF'
          import urllib.request, csv, json, io

          url = "https://www.data.gouv.fr/api/1/datasets/r/d2b9e8e6-8b0b-4bb6-9851-b4fa2efc8201"
          with urllib.request.urlopen(url) as r:
              content = r.read().decode('utf-8')

          reader = csv.DictReader(io.StringIO(content))
          result = {}
          for row in reader:
              print("COLONNES:", list(row.keys())[:6])  # debug
              print("EXEMPLE:", list(row.values())[:6])  # debug
              # cherche Lyon (69123) dans toutes les colonnes
              for k, v in row.items():
                  if '69123' in str(v):
                      result = dict(row)
                      break
              if result:
                  break

          with open('atmo.json', 'w') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print("RÉSULTAT:", json.dumps(result, ensure_ascii=False))
          EOF

      - name: Commit et push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add atmo.json
          git diff --cached --quiet || git commit -m "Update indice ATMO"
          git push
        
