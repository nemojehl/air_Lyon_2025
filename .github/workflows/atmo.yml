name: Fetch indice ATMO

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-atmo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer et filtrer l'indice ATMO Lyon
        run: |
          python3 - <<'EOF'
          import urllib.request, csv, json, io

          url = "https://www.data.gouv.fr/api/1/datasets/r/d2b9e8e6-8b0b-4bb6-9851-b4fa2efc8201"
          with urllib.request.urlopen(url) as r:
              content = r.read().decode('utf-8')

          reader = csv.DictReader(io.StringIO(content))
          first_row = next(reader)
          
          # Afficher TOUTES les colonnes
          print("TOUTES LES COLONNES:", list(first_row.keys()))
          print("PREMIÈRE LIGNE COMPLÈTE:", first_row)
          EOF

      - name: Commit et push
        run: |
          echo "{}" > atmo.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add atmo.json
          git diff --cached --quiet || git commit -m "debug"
          git push
