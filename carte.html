<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte — Air·Lyon 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg:#040d18; --surface:#0a1929; --surface2:#0f2236;
    --border:#132a45; --text:#c8dff0; --text-dim:#4a7090; --white:#e8f6ff;
    --no2:#f59e0b; --pm10:#ef4444; --pm25:#f97316; --o3:#22d3ee; --so2:#a855f7;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;height:100vh;display:flex;flex-direction:column;}

  nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(4,13,24,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:60px;}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--white);letter-spacing:-.02em;}
  .nav-logo span{color:var(--no2);}
  .nav-links{display:flex;gap:.25rem;}
  .nav-links a{font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);text-decoration:none;padding:.4rem .9rem;border:1px solid transparent;border-radius:3px;transition:all .2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--white);border-color:var(--border);background:var(--surface);}

  .map-wrapper{flex:1;margin-top:60px;display:flex;}

  /* PANNEAU LATERAL */
  .sidebar{width:340px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:400;}
  .sidebar-header{padding:1.5rem;border-bottom:1px solid var(--border);}
  .sidebar-header h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--white);margin-bottom:.35rem;}
  .sidebar-header p{font-size:.62rem;color:var(--text-dim);line-height:1.6;}

  /* POLLUANT SELECTOR */
  .pol-selector{padding:1rem 1.5rem;border-bottom:1px solid var(--border);}
  .pol-selector-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);margin-bottom:.6rem;}
  .pol-buttons{display:flex;flex-wrap:wrap;gap:.35rem;}
  .pol-btn{font-family:'IBM Plex Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;padding:.3rem .7rem;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;}
  .pol-btn:hover{color:var(--white);border-color:var(--text-dim);}
  .pol-btn.active{color:#000;border-color:transparent;font-weight:500;}

  /* STATION LIST */
  .station-list{flex:1;overflow-y:auto;padding:.5rem 0;}
  .station-list::-webkit-scrollbar{width:4px;}
  .station-list::-webkit-scrollbar-track{background:var(--surface);}
  .station-list::-webkit-scrollbar-thumb{background:var(--border);}

  .station-item{padding:.9rem 1.5rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:.75rem;}
  .station-item:hover{background:var(--surface2);}
  .station-item.active{background:var(--surface2);border-left:3px solid;}
  .station-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .station-info{flex:1;}
  .station-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;color:var(--white);margin-bottom:.2rem;}
  .station-type-badge{font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;padding:.1rem .4rem;border-radius:2px;display:inline-block;margin-bottom:.25rem;}
  .station-value{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--white);}
  .station-value small{font-size:.6rem;font-weight:400;color:var(--text-dim);}
  .no-data-badge{font-size:.58rem;color:var(--text-dim);font-style:italic;}

  /* MAP */
  #map{flex:1;position:relative;}

  /* LÉGENDE */
  .map-legend{position:absolute;bottom:20px;right:20px;z-index:500;background:rgba(4,13,24,.92);border:1px solid var(--border);border-radius:6px;padding:1rem;backdrop-filter:blur(8px);min-width:160px;}
  .legend-title{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:.75rem;}
  .legend-scale{display:flex;flex-direction:column;gap:.4rem;}
  .legend-row{display:flex;align-items:center;gap:.5rem;font-size:.6rem;color:var(--text-dim);}
  .legend-circle{border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.2);}

  /* POPUP CUSTOM */
  .leaflet-popup-content-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
  .leaflet-popup-tip{background:var(--surface);}
  .leaflet-popup-content{margin:0;padding:0;}
  .popup-inner{padding:1.25rem;font-family:'IBM Plex Mono',monospace;}
  .popup-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:var(--white);margin-bottom:.25rem;}
  .popup-type{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:.85rem;}
  .popup-table{width:100%;border-collapse:collapse;}
  .popup-table tr{border-bottom:1px solid var(--border);}
  .popup-table tr:last-child{border-bottom:none;}
  .popup-table td{padding:.35rem .1rem;font-size:.65rem;color:var(--text-dim);}
  .popup-table td:first-child{padding-right:.75rem;}
  .popup-table .pol-name{font-weight:500;}
  .popup-table .val{color:var(--white);text-align:right;font-family:'Syne',monospace;}
  .popup-table .val.high{color:var(--pm10);}

  @media(max-width:768px){
    .sidebar{width:100%;height:220px;flex-shrink:0;border-right:none;border-bottom:1px solid var(--border);}
    .map-wrapper{flex-direction:column;}
    #map{height:calc(100vh - 280px);}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Air<span>·</span>Lyon</div>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="dataviz.html">Dataviz</a>
    <a href="infographie.html">Infographie</a>
    <a href="carte.html" class="active">Carte</a>
  </div>
</nav>

<div class="map-wrapper">

  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Stations lyonnaises</h2>
      <p>Cliquez sur une station pour zoomer. Les cercles reflètent les concentrations annuelles 2025.</p>
    </div>
    <div class="pol-selector">
      <div class="pol-selector-label">Polluant affiché :</div>
      <div class="pol-buttons">
        <button class="pol-btn active" data-pol="NO2">NO₂</button>
        <button class="pol-btn" data-pol="PM10">PM10</button>
        <button class="pol-btn" data-pol="PM25">PM2.5</button>
        <button class="pol-btn" data-pol="O3">O₃</button>
        <button class="pol-btn" data-pol="SO2">SO₂</button>
      </div>
    </div>
    <div class="station-list" id="station-list"></div>
  </div>

  <div id="map">
    <div class="map-legend" id="map-legend">
      <div class="legend-title">Concentration (µg/m³)</div>
      <div class="legend-scale" id="legend-scale"></div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const DATA_ANNUEL = {"NO2":{"A7 Sud Lyonnais":29.8,"Est Lyonnais Vaulx-en-Velin":13.7,"Est lyonnais St-Exupéry":8.1,"Lyon Centre":16.3,"Lyon Gerland":15.0,"Lyon Périphérique":40.5,"Lyon Trafic Jaurès":25.9,"Saint Fons Sud":14.6,"Sud Lyonnais Feyzin ZI":15.7,"Sud Lyonnais Ternay":12.4},"PM10":{"A7 Sud Lyonnais":22.1,"Est lyonnais St-Exupéry":14.0,"Lyon Centre":17.0,"Lyon Gerland":15.9,"Lyon Périphérique":21.5,"Lyon Trafic Jaurès":15.1,"Saint Fons Sud":13.5,"Sud Lyonnais Feyzin ZI":18.2},"PM25":{"A7 Sud Lyonnais":10.8,"Est Lyonnais Vaulx-en-Velin":8.1,"Est lyonnais St-Exupéry":9.4,"Lyon Centre":10.8,"Lyon Gerland":10.1},"O3":{"Est Lyonnais Vaulx-en-Velin":41.0,"Est lyonnais St-Exupéry":51.6,"Lyon Centre":51.2,"Sud Lyonnais Ternay":55.6},"SO2":{"Saint Fons Sud":2.9,"Sud Lyonnais Feyzin ZI":5.7}};
const DATA_MENSUEL = {"NO2":{"A7 Sud Lyonnais":[35.9,30.9,29.0,31.9,26.9,33.2,27.0,28.7,25.6,25.2,28.1,35.7],"Est Lyonnais Vaulx-en-Velin":[null,19.4,15.0,12.3,9.9,10.1,7.8,8.5,10.5,13.9,18.5,25.6],"Est lyonnais St-Exupéry":[10.3,11.0,8.5,6.0,5.1,5.9,5.5,6.4,6.0,7.1,11.1,14.3],"Lyon Centre":[21.2,20.0,15.0,15.2,11.7,13.7,10.8,10.9,13.3,15.8,21.1,26.7],"Lyon Gerland":[19.1,18.2,14.0,16.8,12.9,14.7,11.6,14.4,12.4,12.9,15.2,18.2],"Lyon Périphérique":[38.1,46.9,41.3,40.2,39.4,41.6,40.0,41.9,37.4,35.4,40.6,43.6],"Lyon Trafic Jaurès":[29.8,30.5,26.8,23.8,19.4,21.8,18.6,22.8,25.7,27.2,29.7,34.9],"Saint Fons Sud":[21.0,18.7,16.1,13.7,10.0,11.4,10.0,13.0,11.9,13.3,16.4,19.9],"Sud Lyonnais Feyzin ZI":[20.4,18.4,16.1,14.7,12.7,13.3,14.3,14.6,12.6,14.8,17.0,19.7],"Sud Lyonnais Ternay":[15.5,15.7,12.5,10.9,8.9,10.2,9.7,12.0,11.3,13.3,14.3,15.4]},"PM10":{"A7 Sud Lyonnais":[27.3,30.1,23.8,21.6,21.7,24.5,18.3,18.4,14.5,18.7,20.1,27.9],"Est lyonnais St-Exupéry":[15.1,20.9,15.6,10.9,10.3,18.3,12.5,17.0,8.6,12.3,11.8,16.2],"Lyon Centre":[19.5,20.8,16.8,13.4,13.5,23.6,14.3,17.1,11.4,16.8,15.1,22.7],"Lyon Gerland":[20.6,23.3,17.7,13.5,11.6,18.7,11.0,15.1,9.1,13.1,15.0,22.5],"Lyon Périphérique":[23.0,25.5,21.6,21.2,18.4,23.5,16.5,19.2,18.0,22.1,21.2,27.5],"Lyon Trafic Jaurès":[16.2,17.2,13.7,11.8,10.3,14.3,10.2,16.1,13.2,17.5,17.0,23.7],"Saint Fons Sud":[20.2,16.8,13.0,10.5,10.6,17.0,14.6,14.8,8.3,11.3,11.9,14.6],"Sud Lyonnais Feyzin ZI":[20.5,22.2,18.4,21.5,18.4,25.7,15.2,18.0,11.5,14.9,15.1,17.1]},"PM25":{"A7 Sud Lyonnais":[15.4,18.5,10.2,5.7,7.3,12.0,7.7,9.1,5.1,8.0,12.5,17.0],"Est Lyonnais Vaulx-en-Velin":[null,14.7,9.9,5.8,6.2,10.7,5.6,7.6,4.5,6.5,6.9,12.0],"Est lyonnais St-Exupéry":[13.3,18.5,12.0,5.6,5.5,9.5,5.7,8.2,4.3,8.6,8.8,13.8],"Lyon Centre":[16.0,17.1,11.4,6.7,6.7,14.8,6.5,8.7,5.7,10.7,10.1,16.6],"Lyon Gerland":[16.2,17.3,11.2,6.3,6.0,11.8,5.3,7.6,4.5,8.6,9.9,16.9]},"O3":{"Est Lyonnais Vaulx-en-Velin":[null,33.4,41.5,55.6,null,80.0,63.8,64.8,33.2,26.6,28.1,18.4],"Est lyonnais St-Exupéry":[43.0,45.9,57.8,66.5,67.2,73.5,65.3,68.4,42.2,32.8,37.1,22.5],"Lyon Centre":[36.2,38.8,53.4,64.7,69.9,74.4,71.3,72.4,45.0,35.3,34.4,16.2],"Sud Lyonnais Ternay":[46.0,46.4,58.6,67.4,75.5,83.8,77.1,72.3,42.8,32.9,39.1,23.6]},"SO2":{"Saint Fons Sud":[4.9,3.7,4.0,4.3,2.9,1.8,1.6,1.9,2.8,1.9,2.4,2.1],"Sud Lyonnais Feyzin ZI":[7.1,6.9,5.3,4.3,6.0,5.2,9.0,7.8,3.6,4.2,6.2,3.3]}};

const COORDS = {"Lyon Centre":[45.758,4.8333],"Lyon Gerland":[45.733,4.827],"Lyon Périphérique":[45.77,4.87],"Lyon Trafic Jaurès":[45.755,4.838],"A7 Sud Lyonnais":[45.6,4.815],"Est Lyonnais Vaulx-en-Velin":[45.778,4.922],"Est lyonnais St-Exupéry":[45.718,5.08],"Saint Fons Sud":[45.7,4.856],"Sud Lyonnais Feyzin ZI":[45.67,4.86],"Sud Lyonnais Ternay":[45.633,4.833]};
const TYPES = {"Lyon Centre":"Urbain fond","Lyon Gerland":"Urbain fond","Lyon Périphérique":"Périurbain fond","Lyon Trafic Jaurès":"Trafic","A7 Sud Lyonnais":"Trafic autoroutier","Est Lyonnais Vaulx-en-Velin":"Périurbain fond","Est lyonnais St-Exupéry":"Périurbain fond","Saint Fons Sud":"Industriel","Sud Lyonnais Feyzin ZI":"Industriel","Sud Lyonnais Ternay":"Périurbain fond"};

const POL_COLORS = { NO2:'#f59e0b', PM10:'#ef4444', PM25:'#f97316', O3:'#22d3ee', SO2:'#a855f7' };
const POL_LABELS = { NO2:'NO₂', PM10:'PM10', PM25:'PM2.5', O3:'O₃', SO2:'SO₂' };
const TYPE_COLORS = { 'Urbain fond':'#60a5fa', 'Périurbain fond':'#34d399', 'Trafic':'#f87171', 'Trafic autoroutier':'#f43f5e', 'Industriel':'#a855f7' };
const TYPE_CLASSES = { 'Urbain fond':'type-urbain', 'Périurbain fond':'type-periurbain', 'Trafic':'type-trafic', 'Trafic autoroutier':'type-trafic', 'Industriel':'type-industriel' };
const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

// Seuils UE pour colorisation relative
const THRESHOLDS_EU = { NO2:40, PM10:40, PM25:25, O3:120, SO2:125 };

let currentPol = 'NO2';
let markers = {};
let map;

// ── CARTE ────────────────────────────────────────────────────────────────────
map = L.map('map', {
  center: [45.72, 4.87],
  zoom: 11,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

function getColor(pol, value) {
  const t = THRESHOLDS_EU[pol];
  const ratio = value / t;
  if (ratio >= 1.0) return '#ef4444';
  if (ratio >= 0.7) return '#f97316';
  if (ratio >= 0.4) return '#f59e0b';
  return '#22d3ee';
}

function getRadius(pol, value) {
  const t = THRESHOLDS_EU[pol];
  return 8 + (value / t) * 22;
}

function buildPopup(station) {
  const allPol = DATA_ANNUEL;
  const rows = Object.entries(allPol)
    .filter(([p, vals]) => vals[station] !== undefined)
    .map(([p, vals]) => {
      const v = vals[station];
      const thresh = THRESHOLDS_EU[p];
      const high = v / thresh >= 0.9;
      return `<tr>
        <td class="pol-name" style="color:${POL_COLORS[p]}">${POL_LABELS[p]}</td>
        <td class="val ${high ? 'high' : ''}">${v} µg/m³</td>
      </tr>`;
    }).join('');

  const typeColor = TYPE_COLORS[TYPES[station]] || '#aaa';
  return `<div class="popup-inner">
    <div class="popup-name">${station}</div>
    <div class="popup-type" style="color:${typeColor}">${TYPES[station]}</div>
    <table class="popup-table">${rows || '<tr><td colspan="2" style="color:#4a7090">Données non disponibles</td></tr>'}</table>
  </div>`;
}

function updateMap(pol) {
  // Supprimer anciens markers
  Object.values(markers).forEach(m => m.remove());
  markers = {};

  const data = DATA_ANNUEL[pol] || {};
  const allStations = Object.keys(COORDS);

  allStations.forEach(station => {
    const coords = COORDS[station];
    const value = data[station];
    const color = value ? getColor(pol, value) : '#2a4560';
    const radius = value ? getRadius(pol, value) : 8;

    const circle = L.circleMarker(coords, {
      radius,
      fillColor: color,
      fillOpacity: 0.75,
      color: color,
      weight: 2,
      opacity: value ? 1 : 0.3,
    }).addTo(map);

    circle.bindPopup(buildPopup(station), {
      className: 'custom-popup',
      maxWidth: 240,
    });

    circle.on('click', () => {
      highlightStation(station);
    });

    markers[station] = circle;
  });

  updateLegend(pol);
  renderList(pol);
}

function updateLegend(pol) {
  const t = THRESHOLDS_EU[pol];
  const unit = 'µg/m³';
  document.getElementById('legend-scale').innerHTML = `
    <div class="legend-row"><div class="legend-circle" style="width:28px;height:28px;background:#ef4444;opacity:.75"></div>≥ ${t} ${unit} (limite UE)</div>
    <div class="legend-row"><div class="legend-circle" style="width:22px;height:22px;background:#f97316;opacity:.75"></div>70–100% limite</div>
    <div class="legend-row"><div class="legend-circle" style="width:16px;height:16px;background:#f59e0b;opacity:.75"></div>40–70% limite</div>
    <div class="legend-row"><div class="legend-circle" style="width:12px;height:12px;background:#22d3ee;opacity:.75"></div>&lt; 40% limite</div>
    <div class="legend-row" style="margin-top:.5rem;color:#2a4560"><div class="legend-circle" style="width:10px;height:10px;background:#2a4560;opacity:.5;border-color:#132a45"></div>Non mesuré</div>
  `;
}

function renderList(pol) {
  const data = DATA_ANNUEL[pol] || {};
  const list = document.getElementById('station-list');
  const stations = Object.keys(COORDS);

  list.innerHTML = stations.map(s => {
    const value = data[s];
    const color = value ? getColor(pol, value) : '#2a4560';
    const typeColor = TYPE_COLORS[TYPES[s]] || '#aaa';
    return `<div class="station-item" data-station="${s}" onclick="highlightStation('${s}')">
      <div class="station-dot" style="background:${color}"></div>
      <div class="station-info">
        <div class="station-name">${s}</div>
        <span class="station-type-badge" style="background:${typeColor}22;color:${typeColor}">${TYPES[s]}</span>
        ${value
          ? `<div class="station-value" style="color:${color}">${value} <small>µg/m³</small></div>`
          : `<div class="no-data-badge">Non mesuré pour ${POL_LABELS[pol]}</div>`
        }
      </div>
    </div>`;
  }).join('');
}

function highlightStation(station) {
  document.querySelectorAll('.station-item').forEach(el => {
    el.classList.toggle('active', el.dataset.station === station);
    if (el.dataset.station === station) {
      const pol = currentPol;
      const color = DATA_ANNUEL[pol]?.[station] ? getColor(pol, DATA_ANNUEL[pol][station]) : '#aaa';
      el.style.borderLeftColor = color;
    }
  });
  if (markers[station]) {
    map.panTo(COORDS[station], { animate: true, duration: 0.5 });
    markers[station].openPopup();
  }
}

// Boutons polluants
document.querySelectorAll('.pol-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPol = btn.dataset.pol;
    const color = POL_COLORS[currentPol];
    document.querySelectorAll('.pol-btn').forEach(b => {
      const active = b.dataset.pol === currentPol;
      b.classList.toggle('active', active);
      if (active) { b.style.background=color; b.style.color='#000'; b.style.borderColor=color; }
      else { b.style.background=''; b.style.color=''; b.style.borderColor=''; }
    });
    updateMap(currentPol);
  });
});

// Init
document.querySelector('.pol-btn[data-pol="NO2"]').style.background = POL_COLORS.NO2;
document.querySelector('.pol-btn[data-pol="NO2"]').style.color = '#000';
document.querySelector('.pol-btn[data-pol="NO2"]').style.borderColor = POL_COLORS.NO2;
updateMap('NO2');
</script>
</body>
</html>
